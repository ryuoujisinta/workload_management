version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: workload-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workload_db
    ports:
      - "5432:5432"
    volumes:
      - workload_pgdata:/var/lib/postgresql/data

volumes:
  workload_pgdata:
